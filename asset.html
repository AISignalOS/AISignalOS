<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset — AISolutionsOS</title>
  <meta name="description" content="A detailed look at an AI asset from the AISolutionsOS library — what it is, who it's for, how to set it up, and the asset itself ready to copy." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="pages.css" />
  <style>
    /* Trust & Quality panel (asset.html-scoped) */
    .tq-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-lg) var(--space-xl);
    }
    @media (max-width: 640px) {
      .tq-grid { grid-template-columns: 1fr; }
    }
    .tq-fact {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--clr-border);
    }
    .tq-fact.tq-full { grid-column: 1 / -1; }
    .tq-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--clr-subtle);
    }
    .tq-value {
      font-size: 0.9375rem;
      color: var(--clr-text);
      line-height: 1.6;
    }
    .tq-tags { display: flex; flex-wrap: wrap; gap: var(--space-xs); }
    .tq-tag {
      display: inline-flex;
      align-items: center;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px var(--space-sm);
      border-radius: var(--radius-full);
      border: 1px solid var(--clr-border);
      background: var(--clr-surface);
      color: var(--clr-muted);
    }
    .tq-pill {
      display: inline-flex;
      align-items: center;
      font-size: 0.8125rem;
      font-weight: 700;
      padding: 2px var(--space-sm);
      border-radius: var(--radius-full);
      border: 1px solid var(--clr-border);
      width: fit-content;
    }
    .tq-status-tested,
    .tq-status-published { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.25); color: #4ade80; }
    .tq-status-paid { background: rgba(79,142,247,0.12); border-color: rgba(79,142,247,0.3); color: var(--clr-blue); }
    .tq-status-draft { background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.25); color: #fbbf24; }
    .tq-status-idea { background: rgba(136,144,164,0.12); border-color: var(--clr-border); color: var(--clr-muted); }
    .tq-risk-low { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.25); color: #4ade80; }
    .tq-risk-medium { background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.25); color: #fbbf24; }
    .tq-risk-high { background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.3); color: #f87171; }
    .tq-dots { display: inline-flex; gap: 4px; }
    .tq-dot {
      width: 10px;
      height: 10px;
      border-radius: var(--radius-full);
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
    }
    .tq-dot.filled { background: var(--clr-blue); border-color: var(--clr-blue); box-shadow: 0 0 6px rgba(79,142,247,0.5); }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="site-nav"></div>

  <main>
    <div class="container">
      <nav class="breadcrumb" id="asset-breadcrumb" aria-label="Breadcrumb"></nav>
    </div>

    <section class="section" style="padding-top: 0;">
      <div class="container" id="asset-root"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script src="asset.js"></script>
</body>
</html>
